# ──────────────────────────────────────────────────────────────────────────────
#  PlayTorrio TV — Android CI/CD
#  Builds split release APKs (armeabi-v7a + arm64-v8a), signs them, and
#  publishes a GitHub release. armeabi-v7a is the primary target (32-bit TVs).
#
#  Trigger:  push a tag like `v1.0.7`  (or run manually via workflow_dispatch)
#
#  Required repo secret:
#    KEYSTORE_BASE64  — base64 of release.jks
#        (create with:  base64 -w0 release.jks   then paste as the secret)
#  Signing passwords/alias are read from app/build.gradle.kts (personal fork).
# ──────────────────────────────────────────────────────────────────────────────
name: Release PlayTorrio TV

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build signed APKs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APKs
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: List built APKs
        run: ls -la app/build/outputs/apk/release/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/app-armeabi-v7a-release.apk
            app/build/outputs/apk/release/app-arm64-v8a-release.apk

      - name: Upload APKs as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PlayTorrioTV-APKs
          path: app/build/outputs/apk/release/*.apk
